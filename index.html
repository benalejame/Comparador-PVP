<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador EAN Rápido</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f5f7fa; color: #333; padding: 20px; padding-bottom: 80px; }
        header { max-width: 600px; margin: 0 auto 20px auto; text-align: center; }
        h1 { font-size: 1.5rem; color: #1a1a1a; margin-bottom: 5px; }
        p.subtitle { color: #666; font-size: 0.9rem; }
        .container { max-width: 600px; margin: 0 auto; display: grid; gap: 15px; }
        .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eef2f5; position: relative; }
        .btn-delete { position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 1.4rem; color: #94a3b8; cursor: pointer; }
        .btn-delete:hover { color: #ef4444; }
        .product-info { margin-bottom: 15px; }
        .product-title { font-size: 1.1rem; font-weight: 600; color: #222; }
        .product-ean { font-size: 0.8rem; color: #888; margin-top: 2px; }
        .price-comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .shop-box { display: block; text-decoration: none; padding: 14px; border-radius: 8px; text-align: center; color: white; font-weight: 600; font-size: 0.9rem; transition: transform 0.1s; }
        .shop-box:active { transform: scale(0.98); }
        .eci { background-color: #008046; }
        .eci:hover { background-color: #006638; }
        .mm { background-color: #df0000; }
        .mm:hover { background-color: #b30000; }
        .btn-add-floating { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background-color: #2563eb; color: white; border: none; border-radius: 50%; font-size: 2rem; font-weight: bold; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: none; align-items: center; justify-content: center; z-index: 20; padding: 20px; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 100%; max-width: 400px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-cancel { background: #f1f5f9; color: #475569; }
        .btn-save { background: #2563eb; color: white; }
    </style>
</head>
<body>

    <header>
        <h1>Mi Lista de Precios</h1>
        <p class="subtitle">Consulta directa sin bloqueos de servidor</p>
    </header>

    <div class="container" id="lista-productos"></div>

    <button class="btn-add-floating" onclick="abrirModal()">+</button>

    <div class="modal-overlay" id="modalFormulario">
        <div class="modal-content">
            <h3 style="margin-bottom:15px;">Añadir EAN a la lista</h3>
            <div class="form-group">
                <input type="number" id="newEan" placeholder="Ej. 8806097827191">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="cerrarModal()">Cancelar</button>
                <button class="btn btn-save" onclick="procesarEan()">Añadir</button>
            </div>
        </div>
    </div>

    <script>
        let productos = JSON.parse(localStorage.getItem('mis_productos_v5')) || [];

        function renderProductos() {
            const container = document.getElementById('lista-productos');
            container.innerHTML = '';

            if (productos.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888; margin-top:20px;">Lista vacía. Pulsa "+" para añadir un código.</p>';
                return;
            }

            productos.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="btn-delete" onclick="eliminarProducto(${prod.id})">×</button>
                    <div class="product-info">
                        <div class="product-title">${prod.nombre}</div>
                        <div class="product-ean">EAN: ${prod.ean}</div>
                    </div>
                    <div class="price-comparison">
                        <a href="${prod.urlECI}" target="_blank" class="shop-box eci">El Corte Inglés ↗</a>
                        <a href="${prod.urlMM}" target="_blank" class="shop-box mm">MediaMarkt ↗</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function abrirModal() { document.getElementById('modalFormulario').style.display = 'flex'; document.getElementById('newEan').focus(); }
        function cerrarModal() { document.getElementById('modalFormulario').style.display = 'none'; document.getElementById('newEan').value = ''; }

        async function procesarEan() {
            const ean = document.getElementById('newEan').value.trim();
            if (!ean) return;

            if (productos.some(p => p.ean === ean)) {
                alert('Este código ya está en la lista.');
                cerrarModal();
                return;
            }

            try {
                const response = await fetch(`/.netlify/functions/buscar-ean?ean=${ean}`);
                const data = await response.json();

                productos.push({
                    id: Date.now(),
                    ean: data.ean,
                    nombre: data.nombre,
                    urlECI: data.urlECI,
                    urlMM: data.urlMM
                });

                localStorage.setItem('mis_productos_v5', JSON.stringify(productos));
                cerrarModal();
                renderProductos();
            } catch (e) {
                alert('Error al conectar con Netlify.');
            }
        }

        function eliminarProducto(id) {
            if (confirm('¿Eliminar producto?')) {
                productos = productos.filter(p => p.id !== id);
                localStorage.setItem('mis_productos_v5', JSON.stringify(productos));
                renderProductos();
            }
        }

        renderProductos();
    </script>
</body>
</html>
