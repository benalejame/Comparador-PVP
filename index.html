<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador EAN Profesional</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
            padding: 20px;
            padding-bottom: 80px;
        }
        header {
            max-width: 800px;
            margin: 0 auto 20px auto;
            text-align: center;
        }
        h1 { font-size: 1.5rem; color: #1a1a1a; margin-bottom: 5px; }
        p.subtitle { color: #666; font-size: 0.9rem; }
        .container { max-width: 800px; margin: 0 auto; display: grid; gap: 15px; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eef2f5;
            position: relative;
        }
        .btn-delete {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #94a3b8;
            cursor: pointer;
            line-height: 1;
            padding: 4px;
        }
        .btn-delete:hover { color: #ef4444; }
        .product-info { margin-bottom: 12px; padding-right: 25px; }
        .product-title { font-size: 1.1rem; font-weight: 600; color: #222; }
        .product-ean { font-size: 0.8rem; color: #888; margin-top: 2px; }
        .price-comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .shop-box {
            padding: 12px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            text-align: center;
            position: relative;
        }
        .shop-name { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .eci { color: #008046; }
        .mm { color: #df0000; }
        .price { font-size: 1.3rem; font-weight: 700; color: #1e293b; }
        .winner { background: #f0fdf4; border-color: #bbf7d0; }
        .winner .price { color: #166534; }
        .badge {
            position: absolute;
            top: -8px;
            right: 8px;
            background: #22c55e;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
        }
        .btn-add-floating {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 20px;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .modal-content h3 { margin-bottom: 15px; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 6px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-cancel { background: #f1f5f9; color: #475569; }
        .btn-save { background: #2563eb; color: white; }
        
        .loading-text { display: none; color: #2563eb; font-size: 0.85rem; margin-top: 5px; font-weight: 500; }
    </style>
</head>
<body>

    <header>
        <h1>Comparador EAN Fijo</h1>
        <p class="subtitle">Búsqueda de descripción y consistencia de precios</p>
    </header>

    <div class="container" id="lista-productos">
        </div>

    <button class="btn-add-floating" onclick="abrirModal()">+</button>

    <div class="modal-overlay" id="modalFormulario">
        <div class="modal-content">
            <h3>Buscar Producto por EAN</h3>
            <div class="form-group">
                <label for="newEan">Introduce el código EAN</label>
                <input type="number" id="newEan" placeholder="Ej. 6932554405557">
                <div class="loading-text" id="loadingText">Buscando descripción en internet...</div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="cerrarModal()">Cancelar</button>
                <button class="btn btn-save" id="btnBuscar" onclick="procesarEan()">Buscar</button>
            </div>
        </div>
    </div>

    <script>
        // Diccionario estático de productos conocidos para que NUNCA varíen de precio si se repiten
        const BD_PRECIOS_FIJOS = {
            "6932554405557": {
                nombre: "Xiaomi 17T Pro 12GB + 1TB (Deep Violet)",
                precioECI: 1099.00,
                precioMM: 1039.44
            }
        };

        // Cargar lista activa del usuario desde el almacenamiento local
        let productos = JSON.parse(localStorage.getItem('mis_productos_ean_v2')) || [];

        function renderProductos() {
            const container = document.getElementById('lista-productos');
            container.innerHTML = '';

            if (productos.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888; margin-top:20px;">Lista vacía. Pulsa "+" para añadir un EAN.</p>';
                return;
            }

            productos.forEach(prod => {
                const eciEsMasBarato = prod.precioECI < prod.precioMM;
                const mmEsMasBarato = prod.precioMM < prod.precioECI;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="btn-delete" onclick="eliminarProducto(${prod.id})" title="Eliminar">×</button>
                    <div class="product-info">
                        <div class="product-title">${prod.nombre}</div>
                        <div class="product-ean">EAN: ${prod.ean}</div>
                    </div>
                    <div class="price-comparison">
                        <div class="shop-box ${eciEsMasBarato ? 'winner' : ''}">
                            ${eciEsMasBarato ? '<span class="badge">Más barato</span>' : ''}
                            <div class="shop-name eci">El Corte Inglés</div>
                            <div class="price">${prod.precioECI.toFixed(2)}€</div>
                        </div>
                        <div class="shop-box ${mmEsMasBarato ? 'winner' : ''}">
                            ${mmEsMasBarato ? '<span class="badge">Más barato</span>' : ''}
                            <div class="shop-name mm">MediaMarkt</div>
                            <div class="price">${prod.precioMM.toFixed(2)}€</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function abrirModal() {
            document.getElementById('modalFormulario').style.display = 'flex';
            document.getElementById('newEan').focus();
        }

        function cerrarModal() {
            document.getElementById('modalFormulario').style.display = 'none';
            document.getElementById('newEan').value = '';
            document.getElementById('loadingText').style.display = 'none';
        }

        async function procesarEan() {
            const ean = document.getElementById('newEan').value.trim();
            if (!ean) return alert('Introduce un EAN.');

            // Validar si el EAN ya existe exactamente igual en la pantalla para no duplicarlo sin sentido
            const yaExiste = productos.some(p => p.ean === ean);
            if (yaExiste) {
                alert('Este producto ya está añadido en tu lista actual.');
                cerrarModal();
                return;
            }

            document.getElementById('loadingText').style.display = 'block';

            let nombreDetectado = "";
            let pECI = 0;
            let pMM = 0;

            // 1. Comprobar si es un producto ya registrado en nuestra base fija (como tu Xiaomi)
            if (BD_PRECIOS_FIJOS[ean]) {
                nombreDetectado = BD_PRECIOS_FIJOS[ean].nombre;
                pECI = BD_PRECIOS_FIJOS[ean].precioECI;
                pMM = BD_PRECIOS_FIJOS[ean].precioMM;
            } else {
                // 2. Intentar buscar la descripción real en una API pública de internet
                try {
                    const response = await fetch(`https://world.openfoodfacts.org/api/v2/product/${ean}.json`);
                    const data = await response.json();
                    if (data.status === 1 && data.product.product_name) {
                        nombreDetectado = data.product.product_name;
                    }
                } catch (e) {
                    console.log("Error consultando API externa");
                }

                // 3. Si la API no lo encuentra, pedimos los datos amablemente una única vez
                if (!nombreDetectado) {
                    document.getElementById('loadingText').style.display = 'none';
                    nombreDetectado = prompt("No encontramos la descripción automática en internet para este EAN.\n\nPor favor, introduce la descripción del producto:");
                    if (!nombreDetectado) { cerrarModal(); return; }
                }

                // Solicitar precios estables para este EAN desconocido
                const inputECI = prompt(`Introduce el precio para: ${nombreDetectado}\nen EL CORTE INGLÉS (€):`, "0.00");
                pECI = parseFloat(inputECI) || 0;

                const inputMM = prompt(`Introduce el precio para: ${nombreDetectado}\nen MEDIAMARKT (€):`, "0.00");
                pMM = parseFloat(inputMM) || 0;

                // Guardamos en nuestro registro temporal de sesión para que si lo vuelves a escribir sea idéntico
                BD_PRECIOS_FIJOS[ean] = { nombre: nombreDetectado, precioECI: pECI, precioMM: pMM };
            }

            // Insertar en la lista visual
            productos.push({
                id: Date.now(),
                ean: ean,
                nombre: nombreDetectado,
                precioECI: pECI,
                precioMM: pMM
            });

            localStorage.setItem('mis_productos_ean_v2', JSON.stringify(productos));
            cerrarModal();
            renderProductos();
        }

        function eliminarProducto(id) {
            if (confirm('¿Eliminar este producto?')) {
                productos = productos.filter(prod => prod.id !== id);
                localStorage.setItem('mis_productos_ean_v2', JSON.stringify(productos));
                renderProductos();
            }
        }

        renderProductos();
    </script>
</body>
</html>
