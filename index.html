<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador EAN Inteligente</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
            padding: 20px;
            padding-bottom: 80px;
        }
        header {
            max-width: 800px;
            margin: 0 auto 20px auto;
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            color: #1a1a1a;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #666;
            font-size: 0.9rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            gap: 15px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eef2f5;
            position: relative;
        }
        .btn-delete {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #94a3b8;
            cursor: pointer;
            line-height: 1;
            padding: 4px;
        }
        .btn-delete:hover { color: #ef4444; }
        .product-info {
            margin-bottom: 12px;
            padding-right: 25px;
        }
        .product-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #222;
        }
        .product-ean {
            font-size: 0.8rem;
            color: #888;
            margin-top: 2px;
        }
        .price-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .shop-box {
            padding: 12px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            text-align: center;
            position: relative;
        }
        .shop-name {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .eci { color: #008046; }
        .mm { color: #df0000; }
        .price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
        }
        .winner {
            background: #f0fdf4;
            border-color: #bbf7d0;
        }
        .winner .price { color: #166534; }
        .badge {
            position: absolute;
            top: -8px;
            right: 8px;
            background: #22c55e;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
        }
        .btn-add-floating {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 20px;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .modal-content h3 { margin-bottom: 15px; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel { background: #f1f5f9; color: #475569; }
        .btn-save { background: #2563eb; color: white; }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
        
        /* Loading indicador */
        .loading-text {
            display: none;
            color: #2563eb;
            font-size: 0.85rem;
            margin-top: 5px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <h1>Comparador EAN</h1>
        <p class="subtitle">Búsqueda automática y guardado persistente</p>
    </header>

    <div class="container" id="lista-productos">
        </div>

    <button class="btn-add-floating" onclick="abrirModal()">+</button>

    <div class="modal-overlay" id="modalFormulario">
        <div class="modal-content">
            <h3>Buscar Producto por EAN</h3>
            <div class="form-group">
                <label for="newEan">Introduce el código EAN</label>
                <input type="number" id="newEan" placeholder="Ej. 6932554405557" pattern="[0-8]*">
                <div class="loading-text" id="loadingText">Buscando producto en las bases de datos...</div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="cerrarModal()">Cancelar</button>
                <button class="btn btn-save" id="btnGuardar" onclick="procesarEan()">Buscar y Añadir</button>
            </div>
        </div>
    </div>

    <script>
        // Cargar datos desde localStorage al iniciar, o dejar array vacío si no hay nada guardado
        let productos = JSON.parse(localStorage.getItem('mis_productos_ean')) || [
            {
                id: 1,
                ean: "6932554405557",
                nombre: "Xiaomi 17T Pro 12GB + 1TB (Deep Violet)",
                precioECI: 1099.00,
                precioMM: 1039.44
            }
        ];

        function renderProductos() {
            const container = document.getElementById('lista-productos');
            container.innerHTML = '';

            if (productos.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888; margin-top:20px;">Lista vacía. Pulsa "+" para escanear/añadir un EAN.</p>';
                return;
            }

            productos.forEach(prod => {
                const eciEsMasBarato = prod.precioECI < prod.precioMM;
                const mmEsMasBarato = prod.precioMM < prod.precioECI;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="btn-delete" onclick="eliminarProducto(${prod.id})" title="Eliminar">×</button>
                    <div class="product-info">
                        <div class="product-title">${prod.nombre}</div>
                        <div class="product-ean">EAN: ${prod.ean}</div>
                    </div>
                    <div class="price-comparison">
                        <div class="shop-box ${eciEsMasBarato ? 'winner' : ''}">
                            ${eciEsMasBarato ? '<span class="badge">Más barato</span>' : ''}
                            <div class="shop-name eci">El Corte Inglés</div>
                            <div class="price">${prod.precioECI.toFixed(2)}€</div>
                        </div>
                        <div class="shop-box ${mmEsMasBarato ? 'winner' : ''}">
                            ${mmEsMasBarato ? '<span class="badge">Más barato</span>' : ''}
                            <div class="shop-name mm">MediaMarkt</div>
                            <div class="price">${prod.precioMM.toFixed(2)}€</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function abrirModal() {
            document.getElementById('modalFormulario').style.display = 'flex';
            document.getElementById('newEan').focus();
        }

        function cerrarModal() {
            document.getElementById('modalFormulario').style.display = 'none';
            document.getElementById('newEan').value = '';
            ocultarCarga();
        }

        function mostrarCarga() {
            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('btnGuardar').disabled = true;
        }

        function ocultarCarga() {
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('btnGuardar').disabled = false;
        }

        // Simulación de consulta API con almacenamiento automático
        async function procesarEan() {
            const ean = document.getElementById('newEan').value.trim();

            if (!ean) {
                alert('Por favor, introduce un código EAN válido.');
                return;
            }

            mostrarCarga();

            // Simulamos la respuesta de red de un servicio de scraping/API externa
            setTimeout(() => {
                let nuevoProducto;

                // Si es el EAN que conocemos, lo clava exacto
                if (ean === "6932554405557") {
                    nuevoProducto = {
                        id: Date.now(),
                        ean: ean,
                        nombre: "Xiaomi 17T Pro 12GB + 1TB (Deep Violet)",
                        precioECI: 1099.00,
                        precioMM: 1039.44
                    };
                } else {
                    // Para cualquier otro EAN, genera datos automáticos coherentes para que veas la funcionalidad
                    const precioAleatorio = Math.floor(Math.random() * (600 - 150) + 150);
                    const variacion = (Math.random() * 30).toFixed(2);
                    
                    nuevoProducto = {
                        id: Date.now(),
                        ean: ean,
                        nombre: `Producto Genérico (EAN: ${ean.substring(0,4)}...)`,
                        precioECI: parseFloat(precioAleatorio),
                        precioMM: parseFloat((precioAleatorio - parseFloat(variacion) + 10).toFixed(2))
                    };
                }

                // Guardar en el estado de la app
                productos.push(nuevoProducto);
                
                // GUARDADO EN MEMORIA (LocalStorage)
                actualizarMemoria();

                cerrarModal();
                renderProductos();
            }, 1200); // Pequeño delay para simular la búsqueda real en internet
        }

        function eliminarProducto(id) {
            if (confirm('¿Eliminar este producto permanentemente?')) {
                productos = productos.filter(prod => prod.id !== id);
                actualizarMemoria();
                renderProductos();
            }
        }

        // Sincroniza el array actual con la memoria del teléfono/navegador
        function actualizarMemoria() {
            localStorage.setItem('mis_productos_ean', JSON.stringify(productos));
        }

        // Carga y renderizado inicial
        renderProductos();
    </script>
</body>
</html>
